# ─────────────────────────────────────────────────────────────
# BLOG.APPSX.COM.BR — WordPress interno (HTTP only).
# TLS é terminado pelo edge nginx (container appsx-site) que faz
# proxy_pass http://localhost:8081 para este container.
# ─────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name blog.appsx.com.br _;
    root /var/www/html;

    index index.php index.html;

    client_max_body_size 64M;

    # Confia no X-Forwarded-Proto enviado pelo edge para gerar URLs https://
    set $fwd_proto $scheme;
    if ($http_x_forwarded_proto) {
        set $fwd_proto $http_x_forwarded_proto;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass blog-wordpress:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS         $fwd_proto;
        fastcgi_param HTTP_X_FORWARDED_PROTO $fwd_proto;
        include fastcgi_params;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|ttf|woff|woff2)$ {
        expires 30d;
        access_log off;
    }

    location ~* /wp-admin/ {
        allow all;
    }
}
