
# ─────────────────────────────────────────────────────────────
# APPSX.COM.BR — Site institucional (Angular SPA)
# ─────────────────────────────────────────────────────────────

# MIME extras (PWA manifest)
types {
  application/manifest+json  webmanifest;
}

# Tipos MIME / compressão
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
  text/plain
  text/css
  text/xml
  text/javascript
  application/javascript
  application/x-javascript
  application/json
  application/manifest+json
  application/xml
  application/xml+rss
  application/wasm
  image/svg+xml
  font/woff
  font/woff2;

# ────────── HTTP → HTTPS ──────────
server {
  listen 80;
  listen [::]:80;
  server_name appsx.com.br www.appsx.com.br;

  # Permite challenge HTTP-01 do certbot (webroot opcional)
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://appsx.com.br$request_uri;
  }
}

# ────────── HTTPS — apex (appsx.com.br) ──────────
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name appsx.com.br;

  ssl_certificate     /etc/letsencrypt/live/appsx.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/appsx.com.br/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # Headers de segurança
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  root /usr/share/nginx/site;
  index index.html;

  # Cache agressivo para artefatos com hash
  location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # index.html nunca em cache (deploy imediato)
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  }
}

# ────────── HTTPS — www (redirect para apex) ──────────
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name www.appsx.com.br;

  ssl_certificate     /etc/letsencrypt/live/appsx.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/appsx.com.br/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  return 301 https://appsx.com.br$request_uri;
}

