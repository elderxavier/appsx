# ELDERXAVIER.COM.BR — Portfólio estático (mesmo edge nginx)
# Conteúdo montado via volume em /usr/share/nginx/elderxavier
# ═════════════════════════════════════════════════════════════

# ────────── HTTP → HTTPS (elderxavier) ──────────
server {
  listen 80;
  listen [::]:80;
  server_name elderxavier.com.br www.elderxavier.com.br;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://elderxavier.com.br$request_uri;
  }
}

# ────────── HTTPS — apex (elderxavier.com.br) ──────────
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name elderxavier.com.br;

  ssl_certificate     /etc/letsencrypt/live/elderxavier.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/elderxavier.com.br/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  root /usr/share/nginx/elderxavier;
  index index.html;

  # Cache moderado para assets (sem hash no nome → 7d)
  location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|webp|avif|ico)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  }
}

# ────────── HTTPS — www → apex (elderxavier) ──────────
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name www.elderxavier.com.br;

  ssl_certificate     /etc/letsencrypt/live/elderxavier.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/elderxavier.com.br/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  return 301 https://elderxavier.com.br$request_uri;
}

# ═════════════════════════════════════════════════════════════
# BLOG.APPSX.COM.BR — WordPress (proxy para container blog-nginx)
# ═════════════════════════════════════════════════════════════

# HTTP → HTTPS (blog)
server {
  listen 80;
  listen [::]:80;
  server_name blog.appsx.com.br;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://blog.appsx.com.br$request_uri;
  }
}

# HTTPS — blog.appsx.com.br (proxy_pass para container)
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name blog.appsx.com.br;

  ssl_certificate     /etc/letsencrypt/live/blog.appsx.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/blog.appsx.com.br/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  location / {
    proxy_pass http://blog-nginx:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
  }
}

# ═════════════════════════════════════════════════════════════
# PULSAR.APPSX.COM.BR — Site Pulsar (proxy para container pulsar-1)
# ═════════════════════════════════════════════════════════════

# HTTP → HTTPS (pulsar)
server {
  listen 80;
  listen [::]:80;
  server_name pulsar.appsx.com.br;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://pulsar.appsx.com.br$request_uri;
  }
}

# HTTPS — pulsar.appsx.com.br (proxy_pass para container)
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name pulsar.appsx.com.br;

  ssl_certificate     /etc/letsencrypt/live/pulsar.appsx.com.br/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/pulsar.appsx.com.br/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  location / {
    proxy_pass http://pulsar-1:80;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
    proxy_buffering off;
    proxy_request_buffering off;
  }
}
